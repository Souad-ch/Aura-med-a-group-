<svg width="160" height="160" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aura Media Group">
  <defs>
    <linearGradient id="auraAnim" x1="20" y1="14" x2="100" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82C4"/>
      <stop offset="0.5" stop-color="#1E5B94"/>
      <stop offset="1" stop-color="#5BA3D8"/>
    </linearGradient>
    <style>
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes sparkle {
        0%,100% { opacity: .35; transform: scale(.7); }
        50%     { opacity: 1;   transform: scale(1.1); }
      }
      @keyframes fadein { to { opacity: 1; } }
      .ring-out { transform-origin: 60px 60px; animation: spin 24s linear infinite; }
      .draw {
        stroke-dasharray: 100; stroke-dashoffset: 100;
        animation: draw 1.6s cubic-bezier(.6,0,.2,1) forwards;
      }
      .ring-main { animation-delay: .1s; }
      .mono      { animation-delay: .7s; }
      .spark {
        transform-origin: 60px 26px; opacity: 0;
        animation: fadein .4s ease 1.6s forwards, sparkle 2.6s ease-in-out 2s infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .draw { stroke-dashoffset: 0; animation: none; }
        .spark { opacity: 1; animation: none; }
        .ring-out { animation: none; }
      }
    </style>
  </defs>

  <!-- aura rings -->
  <circle class="ring-out" cx="60" cy="60" r="50" stroke="url(#auraAnim)" stroke-width="1.4" opacity="0.5"
          pathLength="100" stroke-dasharray="62 38"/>
  <circle class="draw ring-main" cx="60" cy="60" r="44" stroke="url(#auraAnim)" stroke-width="0.9" opacity="0.4"
          pathLength="100"/>
  <!-- monogram A -->
  <path class="draw mono" d="M60 34 L80 86 M60 34 L40 86 M48 71 L72 71"
        stroke="url(#auraAnim)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
        pathLength="100"/>
  <!-- spark -->
  <path class="spark" d="M60 16 L62 24 L70 26 L62 28 L60 36 L58 28 L50 26 L58 24 Z" fill="url(#auraAnim)"/>
</svg>
