<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة — Aura Media Group</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0D0D0D">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; object-src 'none'">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    background:#0D0D0D;color:#F5EDD8;font-family:'Tajawal',sans-serif;text-align:center;padding:24px;
    background-image:radial-gradient(circle at 50% 30%,rgba(201,162,39,.10),transparent 60%)}
  .spark{font-size:2rem;color:#C9A227}
  h1{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,16vw,8rem);font-weight:600;color:#C9A227;line-height:1}
  h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,5vw,2.2rem);font-weight:500;color:#FFFFFF}
  p{color:#A8A8A8;font-weight:500;max-width:420px;line-height:1.9}
  a.home{margin-top:14px;display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:#0D0D0D;
    background:#C9A227;padding:14px 30px;border-radius:40px;font-weight:700;transition:transform .25s,box-shadow .25s}
  a.home:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,162,39,.35)}
</style>
</head>
<body>
  <div class="spark">✦</div>
  <h1>404</h1>
  <h2>هذه الصفحة <em>لا تُرى.</em></h2>
  <p>يبدو أنك وصلت إلى رابط لم نهندسه بعد. لنُعِدك إلى حيث الهيبة الحقيقية.</p>
  <a class="home" href="/">العودة للرئيسية ←</a>
</body>
</html>
